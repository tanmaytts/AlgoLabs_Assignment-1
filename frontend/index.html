<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinPulse</title>
    <!--
      Apply the stored theme before first paint to avoid a flash of the wrong
      background. Reads localStorage; falls back to OS prefers-color-scheme.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('finpulse-theme');
          if (stored === 'dark') {
            document.documentElement.classList.add('dark');
          } else if (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
